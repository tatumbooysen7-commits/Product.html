<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Tech Accessories</h1>
    </header>
      <main>
        <div class="product-gallery">
            <div class="product-card">
                <img src="https://i.ibb.co/FLK8hfGd/JBL-wireless-headphones.webp" alt="JBL wireless headphones">
               <h2>Wireless Headphones</h2>
                <p class="price"><strong>R1299.99</strong></p>
                <button class="add-button"> Add to Cart</button>
            </div> 

            <div class="product-card">
                <img src="https://i.ibb.co/HDKd0jZD/vk-3203-bk-volkanox-python-series-bluetooth-speaker-black-1-2-e-commerce-943c.webp" alt="vk 3203 bk volkanox python series bluetooth speaker black 1 2 e commerce 943c">
                <h2>Bluetooth Speakers</h2>
                <p class="price"><strong>R1499.99</strong></p>
                <button class="add-button"> Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://i.ibb.co/NdWhkfXc/Mobile-Stand.avif" alt="Mobile Stand">
                <h2>Phone Stand</h2>
                <p class="price"><strong>R349.99</strong></p>
                <button class="add-button"> Add to Cart</button>
            </div>

             <div class="product-card">
                <img src="https://i.ibb.co/Fd0hcwp/PEACHZ240-WFast-Charging-USB-Cto-USB-CNylon-Braided-Cable.webp" alt="PEACHZ240WFast Charging USB Cto USB CNylon Braided Cable">
                <h2>USB-C Cable</h2>
                <p class="price"><strong>R199.99</strong></p>
                <button class="add-button"> Add to Cart</button>
            </div> 

            <div class="product-card">
                <img src="https://i.ibb.co/yncpbNGP/tngor12p.webp" alt="tngor12p">
                <h2>Screen Protector</h2>
                <p class="price"><strong>R299.99</strong></p>
               <button class="add-button"> Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="https://i.ibb.co/mpPK9Q3/Redragon-RD-BK-7113-wr-01a.jpg" alt="Redragon RD BK 7113 wr 01a">
                <h2>Keyboard</h2>
                <p class="price"><strong>R499.99</strong></p>
                <button class="add-button"> Add to Cart</button>
            </div>
    </main>
</body>
</html>
